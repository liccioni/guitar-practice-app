name: Daily Operator Report

on:
  workflow_dispatch:
  # Future safe schedule option (intentionally disabled for now):
  # schedule:
  #   # Keep this low-frequency and read-only; avoid build/test jobs here.
  #   - cron: '0 14 * * 1-5'

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

jobs:
  operator-report:
    name: Generate operator report
    runs-on: ubuntu-latest

    steps:
      - name: Collect project state and write report
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          github_api() {
            path="$1"
            curl --fail --silent --show-error \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/${path}"
          }

          pr_json="$(github_api "repos/${REPOSITORY}/pulls?state=open&per_page=20")"
          issue_json="$(github_api "repos/${REPOSITORY}/issues?state=open&per_page=20")"
          commit_json="$(github_api "repos/${REPOSITORY}/commits?per_page=10")"

          pr_count="$(printf '%s' "$pr_json" | jq 'length')"
          issue_count="$(printf '%s' "$issue_json" | jq '[.[] | select(.pull_request | not)] | length')"
          commit_count="$(printf '%s' "$commit_json" | jq 'length')"

          if [ "$pr_count" -gt 0 ]; then
            next_action="Review open pull requests"
          elif [ "$issue_count" -gt 0 ]; then
            next_action="Triage open issues"
          else
            next_action="Plan the next small maintenance task"
          fi

          {
            echo "# Daily Operator Report"
            echo
            echo "Repository: ${REPOSITORY}"
            echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "## Open PRs"
            if [ "$pr_count" -eq 0 ]; then
              echo "No open pull requests."
            else
              printf '%s' "$pr_json" | jq -r '.[] | "- #\(.number): \(.title) (@\(.user.login))"'
            fi
            echo
            echo "## Open Issues"
            if [ "$issue_count" -eq 0 ]; then
              echo "No open issues."
            else
              printf '%s' "$issue_json" | jq -r '.[] | select(.pull_request | not) | "- #\(.number): \(.title) (@\(.user.login))"'
            fi
            echo
            echo "## Recent Commits"
            if [ "$commit_count" -eq 0 ]; then
              echo "No recent commits returned by the API."
            else
              printf '%s' "$commit_json" | jq -r '.[] | "- `\(.sha[0:7])` \(.commit.message | split("\n")[0]) (@\(.author.login // .commit.author.name))"'
            fi
            echo
            echo "## Recommended Next Action Category"
            echo "$next_action"
            echo
            echo "_Planning-only automation: this report is read-only and does not mutate repository state._"
          } >> "$GITHUB_STEP_SUMMARY"
