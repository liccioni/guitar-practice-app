name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Lint, Typecheck, Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

  ios-e2e:
    name: iOS Detox E2E
    runs-on: macos-15
    timeout-minutes: 60
    env:
      EXPO_IOS_DEPLOYMENT_TARGET: "17.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Update CocoaPods
        run: sudo gem install cocoapods -N

      - name: Install applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Show tool versions
        run: |
          node -v
          npm -v
          xcodebuild -version
          xcodebuild -showsdks

      - name: Generate iOS native project
        run: npm run e2e:prebuild:ios

      - name: Force iOS deployment target (pre-pods)
        run: bash scripts/force-ios-deployment-target.sh 17.0

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Force iOS deployment target (post-pods)
        run: bash scripts/force-ios-deployment-target.sh 17.0

      - name: Build iOS app for Detox
        run: npm run e2e:detox:build:ios

      - name: Refresh Detox framework cache
        run: npx detox clean-framework-cache && npx detox build-framework-cache

      - name: Run Detox iOS tests
        run: npm run e2e:detox:test:ios
