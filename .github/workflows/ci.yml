name: CI

on:
  # Temporary cost-control mode: disable automatic runs.
  # Re-enable push/pull_request triggers when Actions credits are available again.
  workflow_dispatch:

jobs:
  quality:
    name: Lint, Typecheck, Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage
