name: Detox iOS E2E

on:
  # Temporary cost-control mode: disable automatic runs.
  # Re-enable PR/schedule triggers when Actions credits are available again.
  workflow_dispatch:

jobs:
  ios-e2e:
    name: iOS Detox E2E
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      EXPO_IOS_DEPLOYMENT_TARGET: "17.0"
    # Detox on macOS runners consumes GitHub Actions minutes quickly.
    # Detox should normally be run locally during development.
    # CI Detox runs only when explicitly requested (manual trigger, PR labeled `e2e`, or nightly schedule).
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'e2e')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Update CocoaPods
        run: sudo gem install cocoapods -N

      - name: Install applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Show tool versions
        run: |
          node -v
          npm -v
          xcodebuild -version
          xcodebuild -showsdks

      - name: Generate iOS native project
        run: npm run e2e:prebuild:ios

      - name: Force iOS deployment target (pre-pods)
        run: bash scripts/force-ios-deployment-target.sh 17.0

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Force iOS deployment target (post-pods)
        run: bash scripts/force-ios-deployment-target.sh 17.0

      - name: Build iOS app for Detox
        run: npm run e2e:detox:build:ios

      - name: Refresh Detox framework cache
        run: npx detox clean-framework-cache && npx detox build-framework-cache

      - name: Run Detox iOS tests
        run: npm run e2e:detox:test:ios
