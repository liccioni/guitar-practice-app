<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fretline - Practice Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e67e00",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231a0f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .progress-glow { box-shadow: 0 0 15px rgba(230, 126, 0, 0.3); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header -->
<header class="flex items-center justify-between p-4 border-b border-primary/10 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Practice Mode</h1>
<div class="flex items-center gap-2 px-3 py-1 bg-primary/10 rounded-full">
<span class="text-xs font-bold text-primary uppercase tracking-wider">Focus</span>
<div class="w-8 h-4 bg-primary rounded-full relative">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
</header>
<!-- Session Progress -->
<div class="px-4 py-3">
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Session Progress</span>
<span class="text-sm font-bold text-primary">65%</span>
</div>
<div class="h-2 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full progress-glow" style="width: 65%;"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-4 py-6 flex flex-col items-center">
<!-- Timer Circle -->
<div class="relative flex items-center justify-center w-64 h-64 mb-8">
<svg class="absolute w-full h-full -rotate-90" viewbox="0 0 100 100">
<circle class="text-primary/10" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-dasharray="283" stroke-dashoffset="100" stroke-width="4"></circle>
</svg>
<div class="flex flex-col items-center">
<span class="text-5xl font-bold tracking-tighter">03:51</span>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest mt-1">Remaining</span>
</div>
</div>
<!-- Activity Info -->
<div class="text-center mb-8">
<h2 class="text-xl font-bold mb-1">NOW PLAYING: Chromatic Warmup</h2>
<div class="inline-flex items-center gap-1.5 px-3 py-1 bg-green-500/10 text-green-500 rounded-full text-sm font-bold">
<span class="material-symbols-outlined text-sm">stars</span>
                Reward +45 XP
            </div>
</div>
<!-- Metronome Rig Card -->
<div class="w-full bg-primary/5 border border-primary/20 rounded-xl p-5 mb-8">
<div class="flex items-center justify-between mb-6">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/20 rounded-lg">
<span class="material-symbols-outlined text-primary">timer</span>
</div>
<h3 class="font-bold text-lg">Metronome Rig</h3>
</div>
<div class="flex items-center gap-3">
<span class="text-xs font-bold uppercase text-slate-500">On</span>
<div class="w-10 h-5 bg-primary rounded-full relative cursor-pointer">
<div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
</div>
<div class="flex items-center justify-between gap-4 mb-6">
<button class="w-12 h-12 flex items-center justify-center bg-background-light dark:bg-background-dark border border-primary/20 rounded-lg hover:bg-primary/10 transition-colors">
<span class="text-primary font-bold">-5</span>
</button>
<div class="flex flex-col items-center">
<span class="text-3xl font-black text-primary">90</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">BPM</span>
</div>
<button class="w-12 h-12 flex items-center justify-center bg-background-light dark:bg-background-dark border border-primary/20 rounded-lg hover:bg-primary/10 transition-colors">
<span class="text-primary font-bold">+5</span>
</button>
</div>
<label class="flex items-center gap-3 cursor-pointer">
<input checked="" class="w-5 h-5 rounded border-primary/40 bg-transparent text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Beat pulse locked</span>
</label>
</div>
<!-- Motivation & Controls -->
<div class="w-full mt-auto">
<p class="text-center text-slate-500 dark:text-slate-400 text-sm italic mb-6">"Lock in. Every rep makes you cleaner."</p>
<div class="flex gap-4">
<button class="flex-1 py-4 bg-primary/10 text-primary font-bold rounded-xl hover:bg-primary/20 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">pause</span>
                    Pause
                </button>
<button class="flex-1 py-4 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-bold rounded-xl hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">skip_next</span>
                    Skip
                </button>
</div>
</div>
</main>
<!-- Navigation -->
<nav class="flex border-t border-primary/10 bg-background-light dark:bg-background-dark px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-bold uppercase">Home</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-current">piano</span>
<p class="text-[10px] font-bold uppercase">Practice</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">library_music</span>
<p class="text-[10px] font-bold uppercase">Songs</p>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-bold uppercase">Profile</p>
</a>
</nav>
</body></html>
