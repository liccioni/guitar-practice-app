        }

<style>

<div class="flex items-center gap-3">
<button class="text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">content_copy</span>
</button>
<button class="text-slate-600 dark:text-slate-400 hover:text-red-500 transition-colors">

</div>
</div>

<div class="flex flex-row sm:flex-col justify-center items-center gap-2 border-r border-primary/10 pr-2">

<button class="p-1 rounded-md hover:bg-primary/20 text-primary transition-colors">
<span class="material-symbols-outlined">keyboard_arrow_down</span>

<div class="flex flex-1 flex-col gap-3">
<div class="flex justify-between items-start">
<div>

</div>

<div class="size-12 rounded-full bg-primary flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform">

</div>
<span class="text-sm font-bold text-primary uppercase tracking-widest">Add Next Drill</span>
</div>
</div>
</div>

<div class="mt-10 p-4 rounded-xl bg-slate-100 dark:bg-primary/10 border border-primary/20">

</div>
<div class="text-right">

<p class="text-2xl font-black text-primary">170 XP</p>

</div>

<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-primary/10 flex gap-4 max-w-2xl mx-auto w-full">

<button class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all">
